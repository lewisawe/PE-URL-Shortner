groups:
  - name: url_shortener
    rules:
      - alert: ServiceDown
        expr: up{job="flask-app"} == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "App instance {{ $labels.instance }} is down"

      - alert: HighErrorRate
        expr: rate(flask_http_request_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.instance }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(flask_http_request_duration_seconds_bucket[5m])) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency > 3s on {{ $labels.instance }}"
